name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ocaml-version: ["5.1", "5.2", "5.3"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install libxgboost 3.0
        run: |
          # Ubuntu 24.04 LTS ships an older libxgboost without the
          # >=2.0 entry points we bind. Install 3.0.0 from the upstream
          # Python wheel (which carries a prebuilt libxgboost.so) and
          # take the headers from the matching source tag.
          sudo apt-get update
          sudo apt-get install -y pkg-config python3-pip patchelf libgomp1
          python3 -m pip install --user --break-system-packages xgboost==3.0.0
          XGBOOST_PY=$(python3 -c 'import os, xgboost; print(os.path.dirname(xgboost.__file__))')
          sudo install -m 0644 "$XGBOOST_PY/lib/libxgboost.so" /usr/lib/x86_64-linux-gnu/
          # The wheel was built with auditwheel: libxgboost.so DT_NEEDEDs
          # a hash-name-mangled libgomp-HASH.so.1.0.0 bundled alongside
          # it. Re-point the dependency at the system libgomp so we
          # don't need to ship the mangled file (and don't need a
          # custom ldconfig entry). Discover the mangled name first
          # since the hash is build-specific.
          MANGLED_GOMP=$(patchelf --print-needed /usr/lib/x86_64-linux-gnu/libxgboost.so | grep -E '^libgomp-' || true)
          if [ -n "$MANGLED_GOMP" ]; then
            sudo patchelf --replace-needed "$MANGLED_GOMP" libgomp.so.1 \
              /usr/lib/x86_64-linux-gnu/libxgboost.so
          fi
          # Headers from the matching upstream tag
          git clone --depth 1 --branch v3.0.0 https://github.com/dmlc/xgboost.git /tmp/xgboost-src
          sudo cp -r /tmp/xgboost-src/include/xgboost /usr/include/
          # pkg-config file so config/discover.ml finds it
          sudo tee /usr/lib/x86_64-linux-gnu/pkgconfig/xgboost.pc > /dev/null <<'EOF'
          prefix=/usr
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib/x86_64-linux-gnu
          includedir=${prefix}/include

          Name: xgboost
          Description: XGBoost gradient boosting library
          Version: 3.0.0
          Libs: -L${libdir} -lxgboost
          Cflags: -I${includedir}
          EOF
          sudo ldconfig
          # Sanity check: confirm the symbol we need is present
          nm -D /usr/lib/x86_64-linux-gnu/libxgboost.so | grep -E ' T XGBoosterTrainOneIter$' \
            || (echo "libxgboost.so missing XGBoosterTrainOneIter" && exit 1)

      - name: Set up OCaml ${{ matrix.ocaml-version }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-version }}

      - name: Install OCaml deps
        run: opam install . --deps-only --with-test --yes

      - name: Build
        run: opam exec -- dune build -p xgboost -j 4

      - name: Run tests
        run: opam exec -- dune runtest -p xgboost -j 4

      - name: Build C reference
        run: make -C bin/c_reference

      - name: Run tests under AddressSanitizer
        run: ./scripts/run-asan.sh
